<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINETIC - Dashboard Course Autonome v3.0</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8fafc;
            color: #020617;
            overflow-x: hidden;
        }

        .font-sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
        .font-mono { font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace; }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes growWidth {
            from { width: 0; }
        }

        .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
        .animate-slideIn { animation: slideIn 0.3s ease-out; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Utility classes */
        .tabular-nums { font-variant-numeric: tabular-nums; }
        .tracking-widest { letter-spacing: 0.1em; }
        .tracking-tight { letter-spacing: -0.025em; }
        .leading-none { line-height: 1; }
        .leading-relaxed { line-height: 1.625; }
        
        /* Hidden class */
        .hidden { display: none !important; }
        
        /* Modal backdrop */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            z-index: 200;
        }

        /* Progress bar animation */
        .progress-bar {
            transition: width 0.3s ease-out;
        }

        /* Glow effect */
        .glow-emerald {
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.5);
        }
    </style>
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINETIC OS v3</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide/dist/lucide.min.js"></script>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1480.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @keyframes fadeIn { from {opacity:0} to {opacity:1} }
        .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

<div id="status-bar" class="flex items-center gap-2 p-2 bg-slate-900 text-white">
    <span id="status-indicator" class="w-2 h-2 rounded-full bg-slate-300"></span>
    <span id="status-text" class="text-xs font-bold">Système: En attente</span>
</div>

<div id="view-dashboard"></div>
<div id="view-admin" class="hidden"></div>
<div id="view-logs" class="hidden"></div>
<div id="view-connections" class="hidden"></div>

<!-- Sensor Modal -->
<div id="sensor-modal" class="hidden fixed inset-0 bg-black/30 flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-xl w-[400px] space-y-4">
        <h3 class="text-lg font-black">Panel Capteurs</h3>
        <input type="number" id="sensor-car-number" placeholder="Numéro voiture" class="w-full p-2 border rounded" />
        <div class="flex gap-2">
            <button id="lap-sensor-btn" onclick="triggerLapSensor()" class="flex-1 p-2 bg-emerald-500 text-white rounded">Pulse Lap</button>
            <button id="camera-sensor-btn" onclick="triggerCameraDetection()" class="flex-1 p-2 bg-blue-500 text-white rounded">Camera Detect</button>
        </div>
        <button onclick="toggleSensorPanel()" class="mt-4 px-4 py-2 bg-slate-900 text-white rounded">Fermer</button>
    </div>
</div>

<script>
    // ---------------- STATE ----------------
    const state = {
        currentView: 'dashboard',
        raceStatus: 'waiting',
        raceTime: 0,
        raceStartTime: null,
        totalLaps: 3,
        participants: [],
        logs: [],
        connectionConfig: {
            region: 'eu-west-1',
            tableName: 'race-telemetry-v3',
            status: 'disconnected',
            lastSync: null
        },
        mockDynamoData: []
    };

    let dynamodb = null;

    // ---------------- LOGS ----------------
    function addLog(message, type='info', source='SYSTEM') {
        state.logs.unshift({ timestamp: Date.now(), type, source, message });
        if(state.logs.length>100) state.logs.pop();
        renderLogsView();
    }

    function clearLogs() {
        state.logs = [];
        addLog('Log buffer cleared by operator', 'info', 'SYSTEM');
        renderLogsView();
    }

    function formatLogTime(ts) {
        const d = new Date(ts);
        return `${d.getHours()}:${d.getMinutes()}:${d.getSeconds()}`;
    }

    function renderLogsView() {
        const getIcon = (type) => {
            switch (type) {
                case 'success': return '<i data-lucide="check-circle" class="w-4 h-4 text-emerald-500"></i>';
                case 'warning': return '<i data-lucide="alert-triangle" class="w-4 h-4 text-amber-500"></i>';
                case 'error': return '<i data-lucide="x-circle" class="w-4 h-4 text-red-500"></i>';
                default: return '<i data-lucide="info" class="w-4 h-4 text-blue-500"></i>';
            }
        };

        const html = `
            <div class="p-8 max-w-[1400px] mx-auto space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-black uppercase">Journaux Système</h2>
                    <button onclick="clearLogs()" class="px-4 py-2 bg-slate-100 rounded text-slate-600">TOUT EFFACER</button>
                </div>
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col" style="height: calc(100vh - 250px);">
                    <div class="flex-1 overflow-y-auto p-4 space-y-1 font-mono text-[11px]">
                        ${state.logs.map(log => `
                            <div class="flex items-start gap-4 p-2 hover:bg-slate-50 rounded transition-colors">
                                <span class="text-slate-400 font-bold">[${formatLogTime(log.timestamp)}]</span>
                                <span>${getIcon(log.type)}</span>
                                <span class="font-black uppercase text-slate-400">${log.source}</span>
                                <span class="text-slate-700 font-medium">${log.message}</span>
                            </div>
                        `).join('')}
                        ${state.logs.length === 0 ? `
                            <div class="h-full flex flex-col items-center justify-center text-slate-300 py-20">
                                <p class="font-bold uppercase">Tampon vide. En attente d'événements système...</p>
                            </div>
                        ` : ''}
                    </div>
                </div>
            </div>
        `;
        document.getElementById('view-logs').innerHTML = html;
        lucide.createIcons();
    }

    // ---------------- CONNECTIONS ----------------
    function updateConnectionConfig(field, value) {
        state.connectionConfig[field] = value;
        renderConnectionsView();
    }

    function connectAWS() {
        addLog(`Attempting handshake with DynamoDB at ${state.connectionConfig.region}...`, 'info', 'AWS');

        AWS.config.update({
            region: state.connectionConfig.region,
            accessKeyId: "🔴METTRE_TA_ACCESS_KEY",
            secretAccessKey: "🔴METTRE_TA_SECRET_KEY"
        });

        dynamodb = new AWS.DynamoDB.DocumentClient();

        setTimeout(() => {
            state.connectionConfig.status = 'connected';
            addLog(`Secure connection established with table: ${state.connectionConfig.tableName}`, 'success', 'AWS');
            renderConnectionsView();
            startDynamoStream();
        }, 1000);
    }

    function disconnectAWS() {
        state.connectionConfig.status = 'disconnected';
        state.mockDynamoData = [];
        addLog(`Disconnected from DynamoDB cluster`, 'warning', 'AWS');
        renderConnectionsView();
    }

    function startDynamoStream() {
        setInterval(() => {
            if (state.connectionConfig.status !== 'connected') return;

            const params = { TableName: state.connectionConfig.tableName, Limit: 5 };
            dynamodb.scan(params, function(err, data) {
                if(err) { addLog(err.message, 'error', 'AWS'); return; }
                state.mockDynamoData = data.Items.map(i => ({ sensor_id:i.sensor_id, value:i.value, timestamp:i.timestamp }));
                if(state.currentView==='connections') renderConnectionsView();
            });
        }, 3000);
    }

    function renderConnectionsView() {
        const html = `
            <div class="p-8 max-w-[1400px] mx-auto">
                <h2 class="text-xl font-black uppercase mb-4">Infrastructure AWS</h2>
                <div class="flex gap-4 mb-4">
                    <select onchange="updateConnectionConfig('region', this.value)" class="border p-2 rounded">
                        <option value="eu-west-1" ${state.connectionConfig.region==='eu-west-1'?'selected':''}>eu-west-1 (Irlande)</option>
                        <option value="us-east-1" ${state.connectionConfig.region==='us-east-1'?'selected':''}>us-east-1 (Virginie)</option>
                    </select>
                    <input type="text" value="${state.connectionConfig.tableName}" onchange="updateConnectionConfig('tableName', this.value)" class="border p-2 rounded" />
                    ${state.connectionConfig.status==='disconnected'
                        ? `<button onclick="connectAWS()" class="bg-slate-900 text-white px-4 py-2 rounded">Connect</button>`
                        : `<button onclick="disconnectAWS()" class="bg-red-500 text-white px-4 py-2 rounded">Disconnect</button>`
                    }
                </div>
                <div class="space-y-2">
                    ${state.mockDynamoData.map(d => `
                        <div class="border p-2 rounded flex justify-between">
                            <span>${d.sensor_id}</span>
                            <span>${d.value}%</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        document.getElementById('view-connections').innerHTML = html;
    }

    // ---------------- VIEW MANAGEMENT ----------------
    function switchView(view) {
        state.currentView = view;
        document.getElementById('view-dashboard').classList.add('hidden');
        document.getElementById('view-admin').classList.add('hidden');
        document.getElementById('view-logs').classList.add('hidden');
        document.getElementById('view-connections').classList.add('hidden');

        document.getElementById('view-' + view).classList.remove('hidden');
        renderCurrentView();
    }

    function renderCurrentView() {
        switch(state.currentView) {
            case 'logs': renderLogsView(); break;
            case 'connections': renderConnectionsView(); break;
        }
    }

    // ---------------- SENSOR MODAL ----------------
    function toggleSensorPanel() {
        const modal = document.getElementById('sensor-modal');
        modal.classList.toggle('hidden');
    }

    // ---------------- INIT ----------------
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        addLog('KINETIC OS v3.0 initialized', 'success', 'BOOT');
        addLog('All subsystems operational', 'info', 'SYSTEM');
        switchView('dashboard'); // affiche ton dashboard par défaut
    });
</script>
</body>
</html>
